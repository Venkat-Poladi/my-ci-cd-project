version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install pytest

  pre_build:
    commands:
      - echo "Running tests..."
      - pytest test_app.py -v

  build:
    commands:
      - echo "Build successful!"
      - echo "App is ready to be packaged"

  post_build:
    commands:
      - echo "All done. Build completed on $(date)"
